    temp_range_C: "-40..125"
    manufacturer: "TBD"
    mpn: "TUNE_OR_EVT_SELECT"
    lcsc: "TUNE_OR_EVT_SELECT"
    procurement_status: TUNE_OR_EVT_SELECT
    note: "Exact value/MPN depends on selected active antenna and RF tuning."

  D3_USB_VBUS_TVS:
    refs: [D3]
    category: tvs
    value: "SMAJ5.0A"
    role: "USB VBUS surge/ESD clamp"
    package: "SMA / DO-214AC"
