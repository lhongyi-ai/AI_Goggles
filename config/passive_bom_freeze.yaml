  U5_USB2_ESD:
    refs: [U5]
    category: esd_array
    value: "TPD2E009"
    role: "USB2 D+/D- ESD clamp"
    package: "SOT-553 (DRL); confirm pad map vs symbol when real symbol added"
    footprint: "Package_TO_SOT_SMD:SOT-553"
    channels: 2
    capacitance_pF_max: 1.5
    vrwm_V_min: 5
    temp_range_C: "-40..125"
    manufacturer: Texas Instruments
    mpn: "TPD2E009"
    lcsc: "PROCUREMENT_VERIFY"
    procurement_status: PROCUREMENT_VERIFY
    note: "Use exact suffix/footprint from purchasable stock before PCB layout."

  D1_D2_INDICATOR_LEDS:
