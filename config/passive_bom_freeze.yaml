    category: esd
    value: "low-cap RF ESD, <=0.3pF"
    role: "GNSS antenna RF ESD clamp"
    package: "SOD-882 (DFN1006-2) low-cap RF ESD"
    footprint: "Diode_SMD:D_SOD-882"
    capacitance_pF_max: 0.3
    vrwm_V_min: 5
    temp_range_C: "-40..125"
    manufacturer: "TBD"
