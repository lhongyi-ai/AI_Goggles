    temp_range_C: "-55..125"
    manufacturer: Murata
    mpn: "BLM18AG601SN1D"
    lcsc: "PROCUREMENT_VERIFY"
    procurement_status: PROCUREMENT_VERIFY

  L2_GNSS_ACTIVE_ANT_CHOKE:
    refs: [L2]
    category: rf_inductor
    value: "RF choke / active antenna bias"
